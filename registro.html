<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Freework - Nuevo Socio Comercial</title>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fuente Unificada -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #07090E; /* Negro profundo corporativo */
            margin: 0; padding: 0; 
            height: 100dvh; min-height: 100dvh; 
            display: flex; flex-direction: column; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }
        
        /* ── ANIMACIONES GLOBALES ── */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .animate-fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        /* ── FONDOS TIPO CRM / VENTAS ── */
        .bg-noise { 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E"); 
        }
        
        /* Gráfico de ventas ascendente de fondo (Ajustado a tonos Violeta/Fucsia) */
        .bg-chart {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M -100 800 C 200 800, 300 500, 500 550 S 700 200, 1100 100' fill='none' stroke='rgba(124, 58, 237, 0.08)' stroke-width='4'/%3E%3Cpath d='M -100 900 C 200 900, 400 600, 600 650 S 800 300, 1100 200' fill='none' stroke='rgba(217, 70, 239, 0.05)' stroke-width='2'/%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
            pointer-events: none;
            z-index: 0;
        }

        .grid-lines {
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 0%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 0%, transparent 100%);
        }
        
        .brand-gradient { background-image: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%); }
        
        .no-scrollbar::-webkit-scrollbar { display: none !important; }
        .no-scrollbar { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }

        /* ── FIX INPUTS IOS/ANDROID ── */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #111520 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* ── EFECTO FIBRA ÓPTICA (DATA STREAMS) ── */
        .fiber-container {
            position: absolute;
            inset: -50%;
            overflow: hidden;
            z-index: 1;
            transform: rotate(-35deg);
            pointer-events: none;
            opacity: 0.7;
        }
        .fiber {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, #c026d3 50%, #fff 100%);
            box-shadow: 0 0 15px #d946ef, 0 0 30px #8b5cf6;
            border-radius: 999px;
            animation: data-stream linear infinite;
            opacity: 0;
        }
        .fiber:nth-child(1) { top: 20%; left: -100%; width: 150px; animation-duration: 3s; animation-delay: 0s; }
        .fiber:nth-child(2) { top: 40%; left: -100%; width: 250px; animation-duration: 4s; animation-delay: 1.2s; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, #7c3aed 50%, #fff 100%); box-shadow: 0 0 15px #7c3aed, 0 0 30px #c026d3; }
        .fiber:nth-child(3) { top: 60%; left: -100%; width: 100px; animation-duration: 2.5s; animation-delay: 0.5s; }
        .fiber:nth-child(4) { top: 80%; left: -100%; width: 300px; animation-duration: 4.5s; animation-delay: 2s; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, #3b82f6 50%, #fff 100%); box-shadow: 0 0 15px #3b82f6, 0 0 30px #8b5cf6; }
        .fiber:nth-child(5) { top: 30%; left: -100%; width: 200px; animation-duration: 3.5s; animation-delay: 2.5s; }
        
        @keyframes data-stream {
            0% { transform: translateX(0); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateX(200vw); opacity: 0; }
        }

        /* ── BOTÓN PREMIUM SHIMMER Y GLASS CARD ── */
        .btn-premium-shimmer {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #6d28d9 0%, #a21caf 100%);
            box-shadow: 0 10px 25px -5px rgba(192, 38, 211, 0.4), inset 0 1px 1px rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-premium-shimmer::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        
        .glass-card {
            background: rgba(17, 21, 32, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="w-full h-full flex flex-col relative overflow-hidden transition-all duration-300">
        
        <!-- ── EFECTOS DE FONDO (ESTILO CRM) ── -->
        <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
            <div class="bg-chart"></div>
            <div class="absolute top-0 -left-20 w-96 h-96 bg-violet-600/20 rounded-full mix-blend-screen filter blur-[100px]"></div>
            <div class="absolute bottom-0 -right-20 w-96 h-96 bg-fuchsia-600/15 rounded-full mix-blend-screen filter blur-[100px]"></div>
            
            <!-- FIBRA ÓPTICA ANIMADA -->
            <div class="fiber-container">
                <div class="fiber"></div>
                <div class="fiber"></div>
                <div class="fiber"></div>
                <div class="fiber"></div>
                <div class="fiber"></div>
            </div>

            <div class="absolute inset-0 bg-noise opacity-30"></div>
            <div class="absolute inset-0 grid-lines opacity-60"></div>
        </div>
            
        <div class="relative z-10 w-full max-w-sm mx-auto px-6 flex flex-col h-full pt-[calc(var(--safe-top)+2rem)]">
            
            <!-- LOGO & TÍTULO (ENFOQUE CORPORATIVO/POSITIVO) -->
            <div class="text-center mb-6 shrink-0 animate-fade-in-up">
                
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-violet-500/10 border border-violet-500/20 mb-4 shadow-sm">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-fuchsia-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-fuchsia-500"></span>
                    </span>
                    <span class="text-[9px] font-black text-fuchsia-400 uppercase tracking-widest">Red de Socios Elite</span>
                </div>

                <div class="flex justify-center mb-3">
                    <img src="imagenes/logo.svg" alt="Logo Freework" class="h-16 w-auto object-contain drop-shadow-2xl">
                </div>
                
                <h1 class="text-3xl font-black text-white tracking-tight drop-shadow-sm">FREEWORK</h1>
                <p class="text-[11px] text-slate-400 font-bold mt-2 uppercase tracking-widest">Registro de Socio Comercial</p>
                <p class="text-[12px] text-slate-400 font-medium mt-1">Únete al ecosistema. <span class="text-fuchsia-400 font-bold">Escala tus comisiones.</span></p>
            </div>

            <!-- FORMULARIO (ESTILO DASHBOARD) -->
            <div class="w-full flex-1 overflow-y-auto no-scrollbar pb-10 safe-pb animate-fade-in-up" style="animation-delay: 0.1s;">
                
                <div class="glass-card rounded-[2rem] p-5 space-y-3.5 mb-2 shadow-2xl">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="user" class="text-slate-500 w-5 h-5 group-focus-within:text-fuchsia-400 transition-colors"></i>
                        </div>
                        <input type="text" id="reg-nombre" placeholder="Nombre completo" class="w-full py-4 pl-12 pr-4 bg-black/40 border border-white/5 rounded-xl text-sm text-white focus:outline-none focus:border-fuchsia-500/50 focus:bg-black/60 transition-all font-medium placeholder-slate-500 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]"/>
                    </div>
                    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="text-slate-500 w-5 h-5 group-focus-within:text-fuchsia-400 transition-colors"></i>
                        </div>
                        <input type="email" id="reg-email" placeholder="Correo de contacto" class="w-full py-4 pl-12 pr-4 bg-black/40 border border-white/5 rounded-xl text-sm text-white focus:outline-none focus:border-fuchsia-500/50 focus:bg-black/60 transition-all font-medium placeholder-slate-500 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" autocapitalize="none"/>
                    </div>
                    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="smartphone" class="text-slate-500 w-5 h-5 group-focus-within:text-fuchsia-400 transition-colors"></i>
                        </div>
                        <input type="tel" inputmode="tel" id="reg-tel" placeholder="WhatsApp (+569...)" class="w-full py-4 pl-12 pr-4 bg-black/40 border border-white/5 rounded-xl text-sm text-white focus:outline-none focus:border-fuchsia-500/50 focus:bg-black/60 transition-all font-medium placeholder-slate-500 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]"/>
                    </div>
                    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="key" class="text-slate-500 w-5 h-5 group-focus-within:text-fuchsia-400 transition-colors"></i>
                        </div>
                        <input type="password" id="reg-pass" placeholder="Crea tu clave secreta" class="w-full py-4 pl-12 pr-4 bg-black/40 border border-white/5 rounded-xl text-sm text-white focus:outline-none focus:border-fuchsia-500/50 focus:bg-black/60 transition-all font-medium placeholder-slate-500 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]"/>
                    </div>
                    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="check-circle" class="text-slate-500 w-5 h-5 group-focus-within:text-fuchsia-400 transition-colors"></i>
                        </div>
                        <input type="password" id="reg-pass2" placeholder="Confirmar clave" class="w-full py-4 pl-12 pr-4 bg-black/40 border border-white/5 rounded-xl text-sm text-white focus:outline-none focus:border-fuchsia-500/50 focus:bg-black/60 transition-all font-medium placeholder-slate-500 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]"/>
                    </div>
                    
                    <button onclick="handleRegister()" id="btn-register" class="w-full h-14 mt-2 btn-premium-shimmer rounded-xl text-white font-black text-sm uppercase tracking-widest active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <i data-lucide="rocket" class="w-4 h-4"></i>
                        Activar mi Ecosistema
                    </button>
                </div>
                
                <!-- ENLACE NATIVO A INICIO.HTML CORREGIDO PARA IFRAME -->
                <div class="text-center mt-6 pt-2 pb-8 flex flex-col items-center gap-1.5">
                    <span class="text-[9px] font-medium text-slate-500 uppercase tracking-widest">¿Ya eres socio? Ignora este paso</span>
                    <button onclick="window.parent.loadInIframe('inicio.html')" class="text-[11px] font-bold text-slate-300 hover:text-white transition-colors uppercase tracking-wider active:scale-95 flex items-center gap-1.5 mt-1 cursor-pointer">
                        Explora y <span class="text-fuchsia-400 font-black">Descarga la App</span> <i data-lucide="arrow-right" class="w-3.5 h-3.5 text-fuchsia-400"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL FEEDBACK (Errores/Validación Mismo Estilo que Login) -->
    <div id="feedbackModal" class="fixed inset-0 z-[150] flex items-center justify-center p-5 bg-[#07090E]/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="bg-[#111520] border border-slate-800 w-full max-w-sm rounded-[2rem] shadow-2xl p-8 flex flex-col items-center text-center transform scale-95 transition-transform duration-300 relative overflow-hidden" id="feedbackModalContent">
            
            <div id="fbIconContainer" class="w-16 h-16 rounded-[1.25rem] flex items-center justify-center mb-6 relative z-10 border">
                <i id="fbIcon" data-lucide="info" class="w-8 h-8"></i>
            </div>
            
            <h3 id="fbTitle" class="text-xl font-black text-white mb-2 tracking-tight relative z-10">Título</h3>
            <p id="fbMsg" class="text-slate-400 text-sm mb-8 leading-relaxed font-medium relative z-10">Mensaje</p>
            
            <button id="fbBtn" class="w-full h-14 rounded-xl font-black text-white text-xs uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-white/10">
                Botón Principal
            </button>
            <button id="fbBtnSec" class="w-full h-12 mt-3 bg-transparent font-bold text-slate-400 text-xs uppercase tracking-widest transition-colors hover:text-white relative z-10" style="display:none;">
                Botón Secundario
            </button>
        </div>
    </div>

    <script>
        const EXTERNAL_URLS = { 
            defaultScript: "https://script.google.com/macros/s/AKfycbzUn0OHXXwbUX9QHXh2E0YUE9BYhKPU2psJ_lQ-OwDAfu7Cznxu01CIu9XgMA5GGdVI/exec" 
        };
        
        const KEY_BIO = 'fw_bio_enabled';

        const apiService = {
            register: async (nombre, email, password, telefono) => {
                try {
                    const res = await fetch(EXTERNAL_URLS.defaultScript, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify({ action: 'register', email, password, nombre, telefono }) 
                    });
                    return await res.json();
                } catch (error) { 
                    return { success: false, message: "Error de conexión con el servidor de Freework." }; 
                }
            }
        };

        // ═══════════════════════════════════════════════════
        //  LÓGICA BIOMÉTRICA NATIVA
        // ═══════════════════════════════════════════════════
        function getBioPlugin() {
            if (window.NativeBiometric) return window.NativeBiometric;
            if (window.Capacitor && window.Capacitor.Plugins.NativeBiometric) return window.Capacitor.Plugins.NativeBiometric;
            return null;
        }

        async function offerBiometric(email, pass) {
            const plugin = getBioPlugin();
            if (!plugin) {
                // Si está en web normal, muestra mensaje de éxito corporativo y altamente motivacional
                showFeedback('success', '¡Bienvenido al Equipo!', 'Tu terminal de ventas ha sido creada correctamente. Prepárate para empezar a facturar y romper tus metas.', 'Ir a Iniciar Sesión', () => { 
                    redirectUrl('login.html'); 
                });
                return;
            }

            // Si está en la app móvil, ofrece guardar la biometría con un tono tecnológico y de ventas
            showFeedback(
                'bio',
                '¡Cuenta Operativa!',
                'Tu ecosistema está listo. ¿Deseas vincular tu Huella Digital o Face ID para acceder en milisegundos la próxima vez?',
                'Sí, Vincular Biometría',
                async () => {
                    try {
                        await plugin.setCredentials({ server: 'freework_app', username: email, password: pass });
                        localStorage.setItem(KEY_BIO, 'true');
                    } catch(e) { console.error("Error guardando biometría:", e); }
                    redirectUrl('login.html');
                },
                'Quizás más tarde',
                () => { redirectUrl('login.html'); }
            );
        }

        // Función de Feedback compartida con el Login (Tonos corporativos Fucsia/Violeta/Rose)
        function showFeedback(type, title, msg, btnTxt, cb, secTxt, secCb) {
            const modal   = document.getElementById('feedbackModal');
            const content = document.getElementById('feedbackModalContent');
            const iconCon = document.getElementById('fbIconContainer');
            const icon    = document.getElementById('fbIcon');
            const btnPri  = document.getElementById('fbBtn');
            const btnSec  = document.getElementById('fbBtnSec');

            document.getElementById('fbTitle').textContent = title;
            document.getElementById('fbMsg').textContent   = msg;

            if(type === 'error') {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border bg-rose-500/10 border-rose-500/20 text-rose-500 shadow-[0_0_20px_rgba(244,63,94,0.15)]';
                icon.setAttribute('data-lucide', 'alert-triangle');
                btnPri.className = 'w-full h-12 rounded-xl font-black text-white text-xs uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-rose-500/20 bg-rose-600 shadow-md';
            } else if (type === 'success') {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border bg-fuchsia-500/10 border-fuchsia-500/20 text-fuchsia-400 shadow-[0_0_20px_rgba(217,70,239,0.15)]';
                icon.setAttribute('data-lucide', 'check-circle-2');
                btnPri.className = 'w-full h-12 rounded-xl font-black text-white text-xs uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-fuchsia-500/20 bg-fuchsia-600 shadow-md';
            } else if (type === 'bio') {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border bg-violet-500/10 border-violet-500/20 text-violet-400 shadow-[0_0_20px_rgba(139,92,246,0.15)]';
                icon.setAttribute('data-lucide', 'fingerprint');
                btnPri.className = 'w-full h-12 rounded-xl font-black text-white text-xs uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-white/10 brand-gradient shadow-md';
            } else {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border bg-slate-800 border-slate-700 text-slate-400 shadow-md';
                icon.setAttribute('data-lucide', 'info');
                btnPri.className = 'w-full h-12 rounded-xl font-black text-white text-xs uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-slate-700 bg-slate-800 shadow-md';
            }

            btnPri.textContent = btnTxt || 'Entendido';
            btnPri.onclick = () => { closeFeedbackModal(); if(cb) cb(); };

            if (secTxt) {
                btnSec.textContent = secTxt;
                btnSec.style.display = '';
                btnSec.onclick = () => { closeFeedbackModal(); if(secCb) secCb(); };
            } else {
                btnSec.style.display = 'none';
            }

            modal.classList.remove('hidden');
            lucide.createIcons({ root: modal });
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeFeedbackModal() {
            const modal   = document.getElementById('feedbackModal');
            const content = document.getElementById('feedbackModalContent');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function setAuthLoading(btnId, text, isLoading) {
            const btn = document.getElementById(btnId); 
            btn.disabled = isLoading;
            btn.innerHTML = isLoading ? `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Registrando...` : `<i data-lucide="rocket" class="w-4 h-4"></i> ${text}`; 
            lucide.createIcons({root: btn});
        }

        // ═══════════════════════════════════════════════════
        // LÓGICA DE REDIRECCIÓN CORREGIDA (APP SHELL / IFRAME)
        // ═══════════════════════════════════════════════════
        function redirectUrl(url) {
            try { 
                // 1. Intenta comunicarse con el menú maestro (App Shell)
                if (window.parent && typeof window.parent.loadInIframe === 'function') {
                    window.parent.loadInIframe(url);
                } 
                // 2. Fallback estándar si se abre por fuera del menú
                else if (window.top !== window.self) { 
                    window.top.location.href = url; 
                } 
                else { 
                    window.location.href = url; 
                } 
            } catch (error) { 
                window.location.href = url;
            }
        }

        async function handleRegister() {
            const n = document.getElementById('reg-nombre').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const t = document.getElementById('reg-tel').value.trim();
            const p1 = document.getElementById('reg-pass').value.trim();
            const p2 = document.getElementById('reg-pass2').value.trim();
            
            document.activeElement.blur();
            
            if(!n || !e || !t || !p1) {
                return showFeedback('error', 'Datos incompletos', 'Por favor, llena todos los campos para configurar tu cuenta comercial.', 'Corregir');
            }
            if(p1 !== p2) {
                return showFeedback('error', 'Error de Seguridad', 'Las contraseñas no coinciden. Verifícalas e inténtalo de nuevo.', 'Corregir');
            }
            
            setAuthLoading('btn-register', 'Activar mi Ecosistema', true);
            
            try {
                const res = await apiService.register(n, e, p1, t);
                if(res.success) {
                    // LLamada al flujo biométrico en lugar de solo redirigir
                    await offerBiometric(e, p1);
                } else { 
                    showFeedback('error', 'Registro Rechazado', res.message || 'No se pudo crear la cuenta en este momento.', 'Cerrar'); 
                }
            } catch(er) { 
                showFeedback('error', 'Fallo de Red', 'Hubo un problema de conexión con el núcleo de Freework.', 'Cerrar'); 
            }
            
            setAuthLoading('btn-register', 'Activar mi Ecosistema', false);
        }

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
