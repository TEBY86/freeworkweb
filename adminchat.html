<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freework Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Estilos Premium Minimalistas con Acentos Vibrantes */
    body { background:#f8fafc; color:#18181b; margin:0; font-family: 'Outfit', sans-serif; overflow: hidden; }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
    @keyframes float { 0%, 100% {transform:translateY(0)} 50% {transform:translateY(-8px)} }
    
    .fade-in  { animation: fadeIn  .4s ease-out forwards; }
    .slide-in { animation: slideIn .4s ease-out forwards; }
    .floating { animation: float 6s ease-in-out infinite; }
    
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#e4e4e7; border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:#d4d4d8; }
    
    /* Glassmorphism Refinado y Elegante */
    .glass-panel { 
      background: rgba(255, 255, 255, 0.85); 
      backdrop-filter: blur(24px) saturate(150%); 
      -webkit-backdrop-filter: blur(24px) saturate(150%); 
      border: 1px solid rgba(255,255,255,0.9); 
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255,255,255,1); 
    }

    /* Utilidad para el degradado original */
    .brand-gradient {
      background: linear-gradient(135deg, #ff4df8 0%, #b233ff 100%);
    }
    .brand-text {
      background: linear-gradient(135deg, #ff4df8 0%, #b233ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ── URL inyectada por Apps Script ─────────────────────────
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI_zmAoT3Y6FD7Qfg9hUYp2SYuVNr6kvQgDVROngwQsm_qLtwEDJkHvQLeXE7LwJw5/exec";

    const api = {
      get: async (action) => {
        try {
          const r = await fetch(`${SCRIPT_URL}?action=${action}`);
          return await r.json();
        } catch (e) { console.error(e); return []; }
      },
      post: async (action, data) => {
        if (action === "loginAgent" && data.username === "demo" && data.password === "demo123") {
          return { success: true, agent: { id: "DEMO_AGENT", name: "Agente Demo" } };
        }
        try {
          const r = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action, data })
          });
          return await r.json();
        } catch (e) { return { success: false, message: e.toString() }; }
      }
    };

    function fmtTime(ts) {
      if (!ts) return "";
      return new Date(Number(ts)).toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" });
    }
    function fmtDate(ts) {
      if (!ts) return "";
      return new Date(Number(ts)).toLocaleDateString("es-CL", { day:"2-digit", month:"short" });
    }

    const STATUS_LABEL = { pending:"Pendiente", active:"Activo", closed:"Cerrado" };
    const STATUS_COLOR = {
      pending: "text-amber-700 bg-amber-50 border-amber-200",
      active:  "text-emerald-700 bg-emerald-50 border-emerald-200",
      closed:  "text-zinc-500 bg-zinc-100 border-zinc-200"
    };

    // ============================================================
    //  VISTA LOGIN
    // ============================================================
    function LoginView({ onLogin }) {
      const [user,     setUser]    = useState("");
      const [pass,     setPass]    = useState("");
      const [msg,      setMsg]     = useState("");
      const [isReg,    setIsReg]   = useState(false);
      const [loading,  setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setMsg("Verificando...");
        if (isReg) {
          const res = await api.post("registerAgent", { username: user.trim(), password: pass.trim() });
          setLoading(false);
          if (res.success) { setMsg("¡Registrado! Ahora inicia sesión."); setIsReg(false); setPass(""); }
          else setMsg(res.message);
        } else {
          const res = await api.post("loginAgent", { username: user.trim(), password: pass.trim() });
          setLoading(false);
          if (res.success) onLogin(res.agent);
          else setMsg(res.message);
        }
      };

      return (
        <div className="min-h-[100dvh] bg-[#f8fafc] flex items-center justify-center p-6 relative overflow-hidden">
          {/* Luces ambientales super sutiles */}
          <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-white blur-[100px] pointer-events-none"></div>

          <div className="w-full max-w-sm relative z-10 glass-panel p-10 rounded-3xl border border-zinc-200/60 shadow-2xl shadow-zinc-200/40">

            {/* Logo con color vibrante */}
            <div className="flex flex-col items-center mb-10">
              <div className="w-16 h-16 mb-6 brand-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-purple-300/50 floating">
                <i className="fa-solid fa-robot text-2xl text-white"></i>
              </div>
              <h1 className="text-2xl font-black tracking-widest text-zinc-900 mb-1">FREEWORK</h1>
              <p className="text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-400 mb-1">Panel de Administración</p>
            </div>

            <form onSubmit={handleSubmit} className="flex flex-col gap-4">
              <div className="flex items-center bg-white border border-zinc-200 rounded-xl px-4 focus-within:border-zinc-400 focus-within:shadow-[0_0_15px_rgba(0,0,0,0.03)] transition-all duration-300">
                <i className="fa-solid fa-user text-zinc-400 mr-3 text-sm"></i>
                <input
                  type="text" value={user} onChange={e => setUser(e.target.value)}
                  placeholder="Usuario" autoComplete="username"
                  className="flex-1 bg-transparent py-3.5 text-sm text-zinc-800 placeholder-zinc-400 outline-none"
                />
              </div>
              <div className="flex items-center bg-white border border-zinc-200 rounded-xl px-4 focus-within:border-zinc-400 focus-within:shadow-[0_0_15px_rgba(0,0,0,0.03)] transition-all duration-300">
                <i className="fa-solid fa-key text-zinc-400 mr-3 text-sm"></i>
                <input
                  type="password" value={pass} onChange={e => setPass(e.target.value)}
                  placeholder="Contraseña" autoComplete="current-password"
                  className="flex-1 bg-transparent py-3.5 text-sm text-zinc-800 placeholder-zinc-400 outline-none"
                />
              </div>

              {msg && (
                <div className={`text-[11px] font-bold text-center py-3 px-4 rounded-xl border tracking-wide fade-in
                  ${msg.includes("egistrado") || msg.includes("esión")
                    ? "text-emerald-700 bg-emerald-50 border-emerald-200 shadow-sm"
                    : "text-rose-700 bg-rose-50 border-rose-200 shadow-sm"}`}>
                  {msg}
                </div>
              )}

              <button
                type="submit" disabled={!user || !pass || loading}
                className="w-full py-4 rounded-xl font-bold text-[12px] uppercase tracking-widest text-white mt-2 disabled:opacity-50 transition-all duration-300 brand-gradient hover:opacity-90 hover:shadow-lg hover:shadow-purple-300/50 hover:scale-[1.01] active:scale-[0.99]"
              >
                {loading
                  ? <i className="fa-solid fa-spinner fa-spin text-lg"></i>
                  : isReg ? "Registrar cuenta" : "Iniciar sesión"}
              </button>
            </form>

            <button
              onClick={() => { setIsReg(!isReg); setMsg(""); }}
              className="mt-8 w-full text-center text-[10px] text-zinc-400 hover:text-zinc-800 font-bold uppercase tracking-widest transition-colors duration-300"
            >
              {isReg ? "¿Ya tienes cuenta? Inicia sesión" : "¿Primera vez? Regístrate"}
            </button>
          </div>
        </div>
      );
    }

    // ============================================================
    //  PANEL PRINCIPAL
    // ============================================================
    function AdminPanel({ agent, onLogout, allChats, allMessages, cannedResponses, reload }) {
      const [view,           setView]           = useState("chats");   // "chats" | "settings"
      const [selectedId,     setSelectedId]     = useState(null);
      const [reply,          setReply]          = useState("");
      const [searchQ,        setSearchQ]        = useState("");
      const [showCanned,     setShowCanned]     = useState(false);
      const [filterStatus,   setFilterStatus]   = useState("all");
      const [newTitle,       setNewTitle]       = useState("");
      const [newText,        setNewText]        = useState("");
      const [sending,        setSending]        = useState(false);
      const bottomRef = useRef(null);

      const conversations = useMemo(() => {
        let list = [...allChats].sort((a, b) => Number(b.timestamp) - Number(a.timestamp));
        if (filterStatus !== "all") list = list.filter(c => c.status === filterStatus);
        if (searchQ.trim()) {
          const q = searchQ.toLowerCase();
          list = list.filter(c => c.clientName?.toLowerCase().includes(q));
        }
        return list;
      }, [allChats, filterStatus, searchQ]);

      const activeMsgs = useMemo(() =>
        allMessages
          .filter(m => m.conversationId === selectedId)
          .sort((a, b) => Number(a.timestamp) - Number(b.timestamp)),
        [allMessages, selectedId]
      );

      // Verificamos si es administrador (contiene admin o termina en "ad")
      const isSuperAdmin = agent.name?.toLowerCase().includes("admin") || 
                           agent.id?.toLowerCase().includes("admin") ||
                           agent.name?.toLowerCase().endsWith("ad") ||
                           agent.id?.toLowerCase().endsWith("ad");
      
      const chatDoc = allChats.find(c => c.id === selectedId);
      const isMyChat = chatDoc?.agentId === agent.id || isSuperAdmin; 
      const isClosed = chatDoc?.status === "closed";
      const pendingCount = allChats.filter(c => c.status === "pending").length;

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [activeMsgs, selectedId]);

      const handleTake = async () => {
        if (!selectedId) return;
        await api.post("takeChat", { chatId: selectedId, agentId: agent.id, agentName: agent.name, status: "active" });
        reload();
      };

      const handleClose = async () => {
        if (!selectedId || !window.confirm("¿Cerrar esta conversación?")) return;
        await api.post("closeChat", { chatId: selectedId });
        reload();
      };

      const handleSend = async (e) => {
        e.preventDefault();
        if (!reply.trim() || sending) return;
        const text = reply.trim(); setReply(""); setSending(true);
        await api.post("sendMessage", { chatId: selectedId, senderRole: "admin", senderName: agent.name, text });
        setSending(false); reload();
      };

      const handleAddCanned = async (e) => {
        e.preventDefault();
        if (!newTitle.trim() || !newText.trim()) return;
        await api.post("addCannedResponse", { title: newTitle.trim(), text: newText.trim() });
        setNewTitle(""); setNewText(""); reload();
      };

      const handleDeleteCanned = async (id) => {
        if (!window.confirm("¿Eliminar esta plantilla?")) return;
        await api.post("deleteCannedResponse", { id }); reload();
      };

      // ── VISTA SETTINGS ────────────────────────────────────
      if (view === "settings") return (
        <div className="min-h-[100dvh] bg-[#f4f4f5] text-zinc-900 relative overflow-hidden flex flex-col">
          <header className="sticky top-0 z-50 glass-panel border-b border-zinc-200/50 px-6 py-4 flex items-center gap-4">
            <button onClick={() => setView("chats")} className="w-10 h-10 flex items-center justify-center text-zinc-500 hover:text-zinc-900 rounded-xl hover:bg-zinc-100 transition-colors border border-transparent hover:border-zinc-200">
              <i className="fa-solid fa-arrow-left text-sm"></i>
            </button>
            <h2 className="font-bold uppercase tracking-widest text-xs text-zinc-800">Gestor de Respuestas Rápidas</h2>
          </header>

          <div className="max-w-3xl mx-auto p-8 relative z-10 flex-1 overflow-y-auto w-full">
            <div className="glass-panel rounded-3xl p-8 mb-8 border border-zinc-200/60 shadow-sm">
              <h3 className="font-bold text-xs uppercase tracking-widest text-zinc-800 mb-6 flex items-center gap-3">
                <div className="w-8 h-8 rounded-lg bg-zinc-100 border border-zinc-200 flex items-center justify-center">
                  <i className="fa-solid fa-bolt text-zinc-600 text-xs"></i>
                </div>
                Crear Nueva Plantilla
              </h3>
              <form onSubmit={handleAddCanned} className="flex flex-col gap-4">
                <input
                  type="text" placeholder="Título (ej: Saludo inicial)" value={newTitle}
                  onChange={e => setNewTitle(e.target.value)}
                  className="bg-white border border-zinc-200 rounded-xl px-5 py-3.5 text-[14px] text-zinc-900 placeholder-zinc-400 outline-none focus:border-purple-400 focus:shadow-[0_0_15px_rgba(178,51,255,0.05)] transition-all"
                />
                <textarea
                  placeholder="Escribe el texto de la respuesta aquí..." value={newText}
                  onChange={e => setNewText(e.target.value)} rows={4}
                  className="bg-white border border-zinc-200 rounded-xl px-5 py-3.5 text-[14px] text-zinc-900 placeholder-zinc-400 outline-none focus:border-purple-400 focus:shadow-[0_0_15px_rgba(178,51,255,0.05)] transition-all resize-none leading-relaxed"
                />
                <div className="flex justify-end mt-2">
                  <button type="submit" className="px-6 py-3 rounded-xl text-[11px] font-bold uppercase tracking-widest text-white hover:scale-[1.02] hover:shadow-lg hover:shadow-purple-300/40 transition-all duration-300 brand-gradient">
                    Guardar Plantilla
                  </button>
                </div>
              </form>
            </div>

            <div className="flex flex-col gap-3">
              {cannedResponses.length === 0 && (
                <div className="text-center py-16 glass-panel rounded-3xl border border-zinc-200/50">
                  <i className="fa-solid fa-folder-open text-3xl text-zinc-300 mb-4"></i>
                  <p className="text-zinc-500 font-medium text-sm">Aún no hay plantillas guardadas.</p>
                </div>
              )}
              {cannedResponses.map(r => (
                <div key={r.id} className="glass-panel rounded-2xl p-6 flex gap-5 items-start fade-in group border border-zinc-200/50 hover:border-zinc-300 hover:shadow-sm transition-all bg-white/50">
                  <div className="w-10 h-10 shrink-0 rounded-xl bg-white flex items-center justify-center border border-zinc-200 shadow-sm">
                    <i className="fa-solid fa-bolt text-zinc-600 text-sm"></i>
                  </div>
                  <div className="flex-1 pt-0.5">
                    <p className="font-bold text-sm text-zinc-900 mb-1.5">{r.title}</p>
                    <p className="text-zinc-500 text-[13px] leading-relaxed whitespace-pre-wrap">{r.text}</p>
                  </div>
                  <button onClick={() => handleDeleteCanned(r.id)} className="w-9 h-9 flex items-center justify-center text-zinc-400 hover:text-white bg-transparent hover:bg-rose-500 border border-transparent hover:border-rose-400 rounded-xl transition-all duration-300 shrink-0 opacity-0 group-hover:opacity-100">
                    <i className="fa-solid fa-trash text-xs"></i>
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      // ── VISTA PRINCIPAL CHATS ─────────────────────────────
      return (
        <div className="h-[100dvh] bg-[#f4f4f5] flex flex-col overflow-hidden relative">
          
          {/* Header Principal */}
          <header className="shrink-0 glass-panel border-b border-zinc-200/60 px-5 py-3 flex items-center justify-between relative z-50">
            <div className="flex items-center gap-4">
              <div className="w-10 h-10 brand-gradient rounded-xl flex items-center justify-center shadow-sm shadow-purple-200">
                <i className="fa-solid fa-robot text-sm text-white"></i>
              </div>
              <div>
                <h1 className="font-bold text-zinc-900 text-sm tracking-widest uppercase">FREEWORK</h1>
                <p className="text-[9px] font-bold tracking-widest uppercase text-zinc-400">Panel de soporte</p>
              </div>
            </div>

            <div className="flex items-center gap-3">
              {pendingCount > 0 && (
                <span className="bg-white border border-zinc-200 text-zinc-600 text-[10px] font-bold px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1.5">
                  <span className="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(245,158,11,0.6)]"></span>
                  {pendingCount} pendiente{pendingCount > 1 ? "s" : ""}
                </span>
              )}
              <div className="hidden sm:flex items-center gap-2 bg-white border border-zinc-200 px-4 py-1.5 rounded-full shadow-sm">
                <span className={`w-1.5 h-1.5 rounded-full ${isSuperAdmin ? 'bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.6)]' : 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]'}`}></span>
                <span className="text-[11px] font-bold text-zinc-700">
                  {agent.name} {isSuperAdmin && <i className="fa-solid fa-crown text-amber-500 ml-1" title="Super Admin"></i>}
                </span>
              </div>
              <div className="w-px h-6 bg-zinc-200 mx-1"></div>
              <button onClick={() => setView("settings")} className="w-9 h-9 flex items-center justify-center text-zinc-500 hover:text-zinc-900 hover:bg-zinc-100 rounded-xl transition-all duration-300" title="Respuestas rápidas">
                <i className="fa-solid fa-bolt text-sm"></i>
              </button>
              <button onClick={onLogout} className="w-9 h-9 flex items-center justify-center text-zinc-500 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all duration-300" title="Cerrar sesión">
                <i className="fa-solid fa-right-from-bracket text-sm"></i>
              </button>
            </div>
          </header>

          <div className="flex-1 flex overflow-hidden relative z-10">

            {/* ── SIDEBAR ─────────────────────────────── */}
            <div className="w-[280px] shrink-0 border-r border-zinc-200/60 glass-panel flex flex-col bg-white/40">

              <div className="p-4 border-b border-zinc-200/60 shrink-0">
                <div className="relative group">
                  <i className="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-400 text-xs group-focus-within:text-purple-500 transition-colors"></i>
                  <input
                    type="text" placeholder="Buscar cliente..." value={searchQ}
                    onChange={e => setSearchQ(e.target.value)}
                    className="w-full bg-white border border-zinc-200 rounded-xl pl-9 pr-4 py-2.5 text-sm text-zinc-800 placeholder-zinc-400 outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(178,51,255,0.05)] transition-all shadow-sm"
                  />
                </div>
              </div>

              <div className="flex gap-1.5 p-3 border-b border-zinc-200/60 shrink-0">
                {["all","pending","active","closed"].map(s => (
                  <button key={s} onClick={() => setFilterStatus(s)}
                    className={`flex-1 py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-wider transition-all
                      ${filterStatus === s ? "brand-gradient text-white shadow-md shadow-purple-200" : "text-zinc-500 hover:text-zinc-800 hover:bg-zinc-100 border border-transparent hover:border-zinc-200"}`}>
                    {s === "all" ? "Todo" : STATUS_LABEL[s]}
                  </button>
                ))}
              </div>

              <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-2 z-10">
                {conversations.length === 0 && (
                  <p className="text-zinc-400 text-xs text-center py-10 font-medium">Sin conversaciones</p>
                )}
                {conversations.map(c => (
                  <button key={c.id} onClick={() => setSelectedId(c.id)}
                    className={`group w-full text-left p-3.5 rounded-xl transition-all duration-200 border shrink-0
                      ${selectedId === c.id
                        ? "bg-white border-zinc-300 shadow-md scale-[1.02]"
                        : "border-transparent hover:bg-white hover:border-zinc-200 hover:shadow-sm"}`}>
                    <div className="flex justify-between items-start mb-1.5">
                      <span className={`font-bold text-sm truncate mr-2 transition-colors ${selectedId === c.id ? "text-zinc-900" : "text-zinc-700"}`}>{c.clientName || "—"}</span>
                      <span className="text-[9px] text-zinc-400 shrink-0 font-medium">{fmtDate(c.timestamp)}</span>
                    </div>
                    <div className="flex items-center justify-between gap-2">
                      <p className={`text-xs truncate transition-colors ${selectedId === c.id ? "text-zinc-600" : "text-zinc-500"}`}>{c.lastMessage || "Sin mensajes"}</p>
                      <span className={`shrink-0 text-[8px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md border ${STATUS_COLOR[c.status] || STATUS_COLOR.closed}`}>
                        {STATUS_LABEL[c.status] || c.status}
                      </span>
                    </div>
                    {c.status === "active" && c.agentId && (
                      <p className="text-[9px] font-semibold text-zinc-500 mt-2 truncate flex items-center gap-1.5">
                        <i className="fa-solid fa-headset text-[8px]"></i> {c.agentName}
                      </p>
                    )}
                  </button>
                ))}
              </div>
            </div>

            {/* ── ÁREA DE CHAT ─────────────────────────── */}
            <div className="flex-1 flex flex-col bg-transparent overflow-hidden relative">

              {!selectedId ? (
                <div className="flex-1 flex flex-col items-center justify-center text-zinc-400">
                  <div className="w-16 h-16 bg-white rounded-2xl border border-zinc-200 flex items-center justify-center mb-5 floating shadow-sm">
                    <i className="fa-solid fa-envelope-open-text text-2xl text-zinc-300"></i>
                  </div>
                  <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400">Selecciona una conversación</p>
                </div>
              ) : (
                <>
                  <div className="shrink-0 glass-panel border-b border-zinc-200/60 px-6 py-4 flex items-center justify-between bg-white/80 z-50 relative shadow-sm">
                    <div className="flex items-center gap-4">
                      <div className="w-10 h-10 bg-white border border-zinc-200 rounded-full flex items-center justify-center font-bold text-zinc-700 shadow-sm">
                        {chatDoc?.clientName?.charAt(0).toUpperCase() || "?"}
                      </div>
                      <div>
                        <h3 className="font-bold text-zinc-900 text-[15px] tracking-wide">{chatDoc?.clientName}</h3>
                        <p className={`text-[9px] font-bold uppercase tracking-widest mt-0.5 ${STATUS_COLOR[chatDoc?.status]?.split(' ')[0] || "text-zinc-500"}`}>
                          {chatDoc?.status === "active"
                            ? `Atendido por ${chatDoc.agentName}`
                            : chatDoc?.status === "pending" ? "Esperando agente"
                            : "Cerrado"}
                        </p>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      {chatDoc?.status === "pending" && (
                        <button onClick={handleTake}
                          className="text-[10px] font-bold uppercase tracking-widest px-5 py-2.5 rounded-xl brand-gradient text-white hover:opacity-90 hover:shadow-lg hover:shadow-purple-300/40 transition-all duration-300">
                          Tomar chat
                        </button>
                      )}
                      {chatDoc?.status === "active" && isMyChat && (
                        <button onClick={handleClose}
                          className="text-[9px] font-bold uppercase tracking-widest px-4 py-2.5 rounded-xl bg-white border border-rose-200 text-rose-600 hover:bg-rose-50 hover:border-rose-300 transition-all duration-300">
                          Cerrar chat
                        </button>
                      )}
                    </div>
                  </div>

                  <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-6 z-10 bg-zinc-50/50">
                    {activeMsgs.map(msg => {
                      const isAdmin  = msg.sender === "admin";
                      const isSystem = msg.senderName === "SISTEMA";
                      if (isSystem) return (
                        <div key={msg.id} className="flex justify-center fade-in my-2">
                          <div className="bg-zinc-100 text-zinc-600 font-mono text-[9px] px-4 py-1.5 rounded-full border border-zinc-200 tracking-wider uppercase shadow-sm">
                            {msg.text}
                          </div>
                        </div>
                      );
                      return (
                        <div key={msg.id} className={`flex flex-col max-w-[75%] fade-in ${isAdmin ? "self-end items-end" : "self-start items-start"}`}>
                          <span className="text-[9px] font-bold uppercase tracking-widest text-zinc-400 mb-1.5 mx-2">
                            {isAdmin ? agent.name : msg.senderName}
                          </span>
                          <div className={`px-5 py-3.5 text-[14px] leading-relaxed shadow-sm ${
                            isAdmin
                              ? "brand-gradient text-white rounded-3xl rounded-tr-sm border border-purple-400/30"
                              : "bg-white border border-zinc-200 text-zinc-800 rounded-3xl rounded-tl-sm"
                          }`}>
                            {msg.text}
                          </div>
                          <span className="text-[9px] text-zinc-400 mt-1.5 mx-2 font-medium">{fmtTime(msg.timestamp)}</span>
                        </div>
                      );
                    })}
                    <div ref={bottomRef} />
                  </div>

                  <div className="shrink-0 p-5 glass-panel border-t border-zinc-200/60 z-50 bg-white/90 relative shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                    {(isClosed && !isSuperAdmin) ? (
                      <div className="text-center py-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 bg-zinc-100 rounded-2xl border border-zinc-200 shadow-inner">
                        <i className="fa-solid fa-lock mr-2"></i>Conversación cerrada
                      </div>
                    ) : chatDoc?.status === "pending" ? (
                      <div className="text-center py-4 text-[10px] font-bold uppercase tracking-widest text-amber-600 bg-amber-50 rounded-2xl border border-amber-200 shadow-inner">
                        Toma el chat para responder
                      </div>
                    ) : !isMyChat ? (
                      <div className="text-center py-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 bg-zinc-100 rounded-2xl border border-zinc-200 shadow-inner">
                        <i className="fa-solid fa-lock mr-2"></i>Gestionado por {chatDoc?.agentName}
                      </div>
                    ) : (
                      <form onSubmit={handleSend} className="flex gap-3 relative">
                        {showCanned && (
                          <div className="absolute bottom-[120%] left-0 w-80 glass-panel border border-zinc-200 rounded-2xl shadow-xl overflow-hidden z-50 slide-in bg-white/95">
                            <div className="px-5 py-3.5 border-b border-zinc-100 flex items-center justify-between">
                              <span className="text-[9px] font-bold uppercase tracking-widest text-zinc-600 flex items-center gap-2">
                                <i className="fa-solid fa-bolt text-zinc-400"></i> Plantillas
                              </span>
                              <button type="button" onClick={() => setShowCanned(false)} className="text-zinc-400 hover:text-rose-500 p-1 transition-colors">
                                <i className="fa-solid fa-xmark text-sm"></i>
                              </button>
                            </div>
                            <div className="max-h-60 overflow-y-auto p-2">
                              {cannedResponses.length === 0 && (
                                <p className="text-zinc-400 text-xs text-center py-6 font-medium">Sin plantillas.</p>
                              )}
                              {cannedResponses.map(r => (
                                <button key={r.id} type="button"
                                  onClick={() => { setReply(r.text); setShowCanned(false); }}
                                  className="w-full text-left p-3.5 rounded-xl hover:bg-zinc-100 transition-all mb-1 border border-transparent hover:border-zinc-200">
                                  <p className="font-bold text-xs text-zinc-900 mb-1">{r.title}</p>
                                  <p className="text-[12px] text-zinc-500 line-clamp-2 leading-relaxed">{r.text}</p>
                                </button>
                              ))}
                            </div>
                          </div>
                        )}

                        <button type="button" onClick={() => setShowCanned(!showCanned)}
                          className={`w-[48px] h-[48px] flex items-center justify-center rounded-xl border transition-all duration-300 shrink-0 shadow-sm ${
                            showCanned ? "bg-purple-50 border-purple-300 text-purple-600"
                            : "bg-white border-zinc-200 text-zinc-500 hover:text-purple-600 hover:border-purple-300 hover:bg-purple-50"}`}>
                          <i className="fa-solid fa-bolt text-sm"></i>
                        </button>

                        <input
                          type="text" value={reply} onChange={e => setReply(e.target.value)}
                          placeholder={isClosed ? "Respondiendo en chat cerrado (Admin)..." : "Escribe tu respuesta aquí..."}
                          className="flex-1 bg-white border border-zinc-200 text-zinc-900 rounded-xl px-5 text-[14px] outline-none focus:border-purple-400 focus:shadow-[0_0_15px_rgba(178,51,255,0.05)] transition-all duration-300 placeholder-zinc-400 shadow-sm"
                        />

                        <button type="submit" disabled={!reply.trim() || sending}
                          className="w-[48px] h-[48px] flex items-center justify-center rounded-xl text-white brand-gradient disabled:opacity-50 transition-all duration-300 shrink-0 hover:shadow-lg hover:shadow-purple-300/40 disabled:hover:shadow-none">
                          {sending
                            ? <i className="fa-solid fa-spinner fa-spin text-sm"></i>
                            : <i className="fa-solid fa-paper-plane text-sm ml-0.5"></i>}
                        </button>
                      </form>
                    )}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    //  COORDINADOR DE DATOS
    // ============================================================
    function App() {
      // Intentar cargar el agente desde localStorage al inicio
      const [agent, setAgent] = useState(() => {
        try {
          const savedAgent = localStorage.getItem("freework_agent");
          return savedAgent ? JSON.parse(savedAgent) : null;
        } catch (e) {
          console.error("Error al leer sesión local:", e);
          return null;
        }
      });

      const [allMessages,    setAllMessages]    = useState([]);
      const [allChats,       setAllChats]       = useState([]);
      const [cannedResponses,setCannedResponses] = useState([]);

      // Función para guardar el login localmente
      const handleLogin = (loggedAgent) => {
        localStorage.setItem("freework_agent", JSON.stringify(loggedAgent));
        setAgent(loggedAgent);
      };

      // Función para borrar el login localmente
      const handleLogout = () => {
        localStorage.removeItem("freework_agent");
        setAgent(null);
      };

      const loadData = async () => {
        const [chatsRaw, msgsRaw, cannedRaw] = await Promise.all([
          api.get("getChats"), api.get("getMessages"), api.get("getCannedResponses")
        ]);

        if (Array.isArray(chatsRaw))
          setAllChats(chatsRaw.map(c => ({
            id:          c["CHAT_ID"],
            clientName:  c["NOMBRE_CLIENTE"],
            status:      c["ESTADO"],
            agentId:     c["AGENTE_ASIGNADO"],
            agentName:   c["AGENTE_NOMBRE"],
            lastMessage: c["ULTIMO_MENSAJE"],
            timestamp:   c["TIMESTAMP"]
          })));

        if (Array.isArray(msgsRaw))
          setAllMessages(msgsRaw.map(m => ({
            id:             m["MENSAJE_ID"],
            conversationId: m["CHAT_ID"],
            sender:         m["ROL_EMISOR"],
            senderName:     m["NOMBRE_EMISOR"],
            text:           m["TEXTO"],
            timestamp:      m["TIMESTAMP"]
          })));

        if (Array.isArray(cannedRaw))
          setCannedResponses(cannedRaw.map(r => ({
            id:    r["ID_RESPUESTA"],
            title: r["TITULO"],
            text:  r["TEXTO"],
            ts:    r["TIMESTAMP"]
          })));
      };

      useEffect(() => {
        if (!agent) return;
        loadData();
        const iv = setInterval(loadData, 5000);
        return () => clearInterval(iv);
      }, [agent]);

      if (!agent) return <LoginView onLogin={handleLogin} />;

      return (
        <AdminPanel
          agent={agent}
          onLogout={handleLogout}
          allChats={allChats}
          allMessages={allMessages}
          cannedResponses={cannedResponses}
          reload={loadData}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
