<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ejecutivos FreeWork</title>

    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#007AFF',
                    }
                }
            }
        }
    </script>

    <!-- 2. React y ReactDOM (Versión 18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 3. Babel (Traduce el código React para el navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased">
    <!-- Contenedor donde React inyectará la aplicación -->
    <div id="root"></div>

    <!-- 4. Lógica de la Aplicación -->
    <script type="text/babel">
        // Extraemos los Hooks de React global
        const { useState, useEffect, useRef } = React;

        /**
         * FREEWORK INGRESO DE DATOS BANCARIOS - Versión v4.1 (Versión HTML CDN)
         * UI Premium: Portal Ejecutivos
         */

        // ===================================================
        // CONFIGURACIÓN DE CONEXIÓN Y DATOS
        // ===================================================
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwZgxuEETs7BYXRNoRUcS7Fs-BO60vMHVSrJ8CvOCBTQA0Er1tDp65GBB6dS1aPdtMF-w/exec';
        const PRIMARY_COLOR = '#007AFF'; 

        const CHILEAN_BANKS = [
          "Banco de Chile / Edwards",
          "Banco Estado",
          "Banco Santander",
          "BCI",
          "Banco Bice",
          "Scotiabank",
          "Banco Itaú",
          "Banco Security",
          "Banco Consorcio",
          "Banco Ripley",
          "Banco Falabella",
          "Mercado Pago",
          "Tenpo",
          "MACH (BCI)",
          "Coopeuch"
        ];

        const ACCOUNT_TYPES = [
          "Cuenta Corriente",
          "Cuenta Vista",
          "Cuenta RUT",
          "Cuenta de Ahorro",
          "Chequera Electrónica"
        ];

        // --- INLINE ICONS ---
        const SunIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        );
        const MoonIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        );
        const ClipboardIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
        );
        const CameraIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        );
        const SendIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        );
        const XIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const CheckCircleIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
        );
        const AlertCircleIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        );
        const ChevronDownIcon = ({ isOpen }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={`transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}><path d="m6 9 6 6 6-6"/></svg>
        );

        // --- COMPONENTE SELECT PREMIUM ---
        const PremiumSelect = ({ label, options, value, onChange, placeholder }) => {
          const [isOpen, setIsOpen] = useState(false);
          const dropdownRef = useRef(null);

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                setIsOpen(false);
              }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
          }, []);

          return (
            <div className="space-y-1.5 relative w-full" ref={dropdownRef}>
              <label className="text-[9px] font-black text-gray-400 dark:text-gray-500 uppercase ml-1 tracking-widest">{label}</label>
              <div 
                onClick={() => setIsOpen(!isOpen)}
                className={`w-full p-3.5 bg-white dark:bg-black/30 border-2 rounded-2xl text-sm cursor-pointer flex justify-between items-center transition-all duration-300 hover:shadow-md ${
                  isOpen ? 'border-blue-500 shadow-lg shadow-blue-500/10' : 'border-gray-100 dark:border-white/5'
                }`}
                style={value ? { borderColor: `${PRIMARY_COLOR}60` } : {}}
              >
                <span className={`truncate mr-2 ${value ? 'text-gray-900 dark:text-white font-bold' : 'text-gray-400 font-medium'}`}>
                  {value || placeholder}
                </span>
                <div className="text-gray-400 flex-shrink-0">
                  <ChevronDownIcon isOpen={isOpen} />
                </div>
              </div>

              {isOpen && (
                <div className="absolute z-[60] mt-2 w-full max-h-56 overflow-y-auto bg-white/95 dark:bg-gray-800/95 backdrop-blur-xl border border-gray-100 dark:border-white/10 rounded-2xl shadow-2xl animate-in fade-in duration-200 py-1.5" style={{scrollbarWidth: 'thin'}}>
                  {options.map((opt) => (
                    <div 
                      key={opt}
                      onClick={() => {
                        onChange(opt);
                        setIsOpen(false);
                      }}
                      className={`px-4 py-2.5 text-xs sm:text-sm cursor-pointer transition-colors ${
                        value === opt 
                        ? 'bg-blue-500 text-white font-bold' 
                        : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5'
                      }`}
                    >
                      {opt}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        };

        // --- APLICACIÓN PRINCIPAL ---
        function App() {
          const [isDarkMode, setIsDarkMode] = useState(() => {
            try { return localStorage.getItem('theme') === 'dark'; } catch { return false; }
          });
          const [inputText, setInputText] = useState('');
          const [selectedBank, setSelectedBank] = useState('');
          const [selectedAccountType, setSelectedAccountType] = useState('');
          const [image, setImage] = useState(null);
          const [loading, setLoading] = useState(false);
          const [status, setStatus] = useState({ message: '', type: null });

          const FIELD_MAPPINGS = {
            nombre: ['Nombre', 'Titular'],
            rut: ['RUT', 'Rut'],
            numeroCuenta: ['Número de Cuenta', 'N de cuenta', 'Numero', 'Nro', 'Cuenta'],
            email: ['Email', 'Correo']
          };

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
              try { localStorage.setItem('theme', 'dark'); } catch {}
            } else {
              document.documentElement.classList.remove('dark');
              try { localStorage.setItem('theme', 'light'); } catch {}
            }
          }, [isDarkMode]);

          const handleInputChange = (e) => {
            const text = e.target.value;
            setInputText(text);
            
            const lowerText = text.toLowerCase();
            
            const foundBank = CHILEAN_BANKS.find(b => {
              const searchStr = b.split('/')[0].trim().toLowerCase();
              return lowerText.includes(searchStr);
            });
            if (foundBank) setSelectedBank(foundBank);

            const foundType = ACCOUNT_TYPES.find(t => lowerText.includes(t.toLowerCase()));
            if (foundType) setSelectedAccountType(foundType);
          };

          const parseFinalData = () => {
            const data = { banco: selectedBank, tipoCuenta: selectedAccountType };
            let textToProcess = inputText;

            Object.entries(FIELD_MAPPINGS).forEach(([key, aliases]) => {
              for (const alias of aliases) {
                const regex = new RegExp(`^${alias}\\s*[:\\-]?\\s*(.+)$`, 'im');
                const match = textToProcess.match(regex);
                if (match && match[1]) {
                  data[key] = match[1].trim();
                  textToProcess = textToProcess.replace(match[0], '');
                  break;
                }
              }
            });

            let lines = textToProcess.split('\n').map(l => l.trim()).filter(Boolean);

            if (!data.rut) {
              const rutRegex = /\b(\d{1,2}\.\d{3}\.\d{3}\s*[-]?\s*[\dkK]|\d{7,8}\s*-\s*[\dkK])\b/i;
              for (let i = 0; i < lines.length; i++) {
                const match = lines[i].match(rutRegex);
                if (match) {
                  data.rut = match[0];
                  lines.splice(i, 1);
                  break;
                }
              }
            }

            if (!data.email) {
              const emailRegex = /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b/i;
              for (let i = 0; i < lines.length; i++) {
                const match = lines[i].match(emailRegex);
                if (match) {
                  data.email = match[0];
                  lines.splice(i, 1);
                  break;
                }
              }
            }

            lines = lines.filter(line => {
              const lowerLine = line.toLowerCase();
              const isBank = CHILEAN_BANKS.some(b => lowerLine.includes(b.split('/')[0].trim().toLowerCase()));
              const isType = ACCOUNT_TYPES.some(t => lowerLine.includes(t.toLowerCase()));
              return !isBank && !isType;
            });

            if (!data.numeroCuenta) {
              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const digitCount = (line.match(/\d/g) || []).length;
                if (digitCount >= 5) {
                  data.numeroCuenta = line;
                  lines.splice(i, 1);
                  break;
                }
              }
            }

            if (!data.nombre && lines.length > 0) {
              const nameLine = lines.find(l => /[a-zA-Z]{3,}/.test(l));
              if (nameLine) {
                data.nombre = nameLine;
              }
            }

            return data;
          };

          const handleImageChange = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (event) => setImage({ name: file.name, data: event.target.result });
              reader.readAsDataURL(file);
            }
          };

          const handleSubmit = async (e) => {
            e.preventDefault();
            const bankData = parseFinalData();
            
            if (!bankData.nombre || !bankData.rut || !bankData.banco || !bankData.tipoCuenta) {
              setStatus({ message: 'Nombre, RUT, Banco y Tipo son obligatorios.', type: 'error' });
              return;
            }

            setLoading(true);
            setStatus({ message: '', type: null });

            try {
              await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                  type: 'BANK_PORTAL_V4.0',
                  data: bankData,
                  image: image ? image.data : null 
                })
              });

              setStatus({ message: 'Datos bancarios enviados con éxito.', type: 'success' });
              setInputText('');
              setSelectedBank('');
              setSelectedAccountType('');
              setImage(null);
            } catch (err) {
              setStatus({ message: 'Error de conexión con el sistema.', type: 'error' });
            } finally {
              setLoading(false);
              setTimeout(() => setStatus({ message: '', type: null }), 5000);
            }
          };

          const copyTemplate = () => {
            const template = `Nombre Completo\nRUT\nTipo de Cuenta\nNúmero de Cuenta\nBanco\nEmail`;
            const t = document.createElement("textarea");
            t.value = template;
            document.body.appendChild(t);
            t.select();
            try {
              document.execCommand('copy');
              setStatus({ message: 'Plantilla copiada', type: 'success' });
              setTimeout(() => setStatus({ message: '', type: null }), 3000);
            } catch {}
            document.body.removeChild(t);
          };

          return (
            <div className="min-h-screen w-full flex flex-col items-center justify-center p-4 sm:p-6 bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-900 dark:to-[#0a0f18] transition-colors duration-500 font-sans overflow-x-hidden">
              
              <button 
                type="button"
                onClick={() => setIsDarkMode(!isDarkMode)}
                className="fixed top-6 right-6 p-3.5 rounded-2xl bg-white/80 dark:bg-gray-800/80 backdrop-blur-md shadow-lg border border-white/40 dark:border-white/10 text-gray-500 dark:text-gray-400 z-50 transition-all hover:scale-105 active:scale-95"
              >
                {isDarkMode ? <SunIcon /> : <MoonIcon />}
              </button>

              <div className="relative w-full max-w-[520px] p-6 sm:p-10 rounded-[32px] sm:rounded-[40px] bg-white/90 dark:bg-[#131b2b]/95 backdrop-blur-xl border border-white/50 dark:border-white/5 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.1)] dark:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.4)]">
                
                <div className="flex flex-col items-center mb-8">
                  <div className="flex items-center justify-center gap-3 mb-4">
                    <div className="h-10 w-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-lg shadow-blue-500/30">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <rect width="20" height="14" x="2" y="7" rx="2" ry="2"/>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                      </svg>
                    </div>
                    <span className="text-2xl font-black tracking-tighter text-gray-900 dark:text-white uppercase">
                      FreeWork
                    </span>
                  </div>

                  <div className="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-blue-50 dark:bg-blue-500/10 border border-blue-100 dark:border-blue-500/20 mb-3 shadow-sm">
                    <span className="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse" />
                    <span className="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest">Portal Ejecutivos</span>
                  </div>

                  <h1 className="text-xl sm:text-2xl font-black text-gray-800 dark:text-white tracking-tight text-center mt-2 leading-tight uppercase">
                    Ingreso de Datos <br/>
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-blue-400 dark:from-blue-400 dark:to-blue-300">
                      Bancarios
                    </span>
                  </h1>
                </div>

                <form onSubmit={handleSubmit} className="space-y-6">
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                    <PremiumSelect 
                      label="Institución Financiera"
                      options={CHILEAN_BANKS}
                      value={selectedBank}
                      onChange={setSelectedBank}
                      placeholder="Ej. Santander"
                    />
                    <PremiumSelect 
                      label="Tipo de Cuenta"
                      options={ACCOUNT_TYPES}
                      value={selectedAccountType}
                      onChange={setSelectedAccountType}
                      placeholder="Ej. Cuenta Corriente"
                    />
                  </div>

                  <div className="space-y-1.5 relative group">
                    <label className="text-[9px] font-black text-gray-400 dark:text-gray-500 uppercase ml-1 tracking-widest">
                      Formato Express (Pega los datos aquí)
                    </label>
                    <div className="relative">
                      <textarea 
                        value={inputText}
                        onChange={handleInputChange}
                        className="w-full h-40 p-5 bg-slate-50 dark:bg-black/20 border-2 border-slate-100 dark:border-white/5 rounded-3xl text-sm focus:ring-0 outline-none transition-all text-gray-900 dark:text-white placeholder-gray-400 shadow-inner resize-none"
                        style={{ borderColor: `${PRIMARY_COLOR}15`, caretColor: PRIMARY_COLOR }}
                        placeholder="Nombre Completo&#10;RUT&#10;..."
                        required
                      />
                      
                      <div className="absolute bottom-4 right-4 flex gap-2">
                         <button 
                          type="button" 
                          onClick={copyTemplate} 
                          title="Copiar Plantilla"
                          className="p-2 bg-white dark:bg-[#1f2937] rounded-xl text-gray-400 hover:text-blue-500 border border-slate-100 dark:border-white/10 shadow-sm transition-transform hover:scale-105 active:scale-95"
                        >
                          <ClipboardIcon />
                        </button>
                        <label 
                          title="Adjuntar Comprobante"
                          className="p-2 bg-white dark:bg-[#1f2937] rounded-xl text-gray-400 hover:text-blue-500 border border-slate-100 dark:border-white/10 shadow-sm transition-transform hover:scale-105 active:scale-95 cursor-pointer"
                        >
                          <CameraIcon />
                          <input type="file" accept="image/*" onChange={handleImageChange} className="hidden" />
                        </label>
                      </div>
                    </div>
                  </div>

                  {image && (
                    <div className="flex items-center justify-between p-3 rounded-2xl bg-blue-50/50 border border-dashed border-blue-200 dark:bg-blue-500/10 dark:border-blue-500/20">
                      <div className="flex items-center gap-3 overflow-hidden">
                        <div className="h-10 w-10 shrink-0 rounded-xl overflow-hidden border-2 border-white dark:border-gray-800 shadow-sm">
                          <img src={image.data} className="h-full w-full object-cover" alt="Preview" />
                        </div>
                        <div className="flex flex-col truncate pr-2">
                          <span className="text-[9px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wide">Comprobante Adjunto</span>
                          <span className="text-xs text-gray-600 dark:text-gray-300 truncate">{image.name}</span>
                        </div>
                      </div>
                      <button type="button" onClick={() => setImage(null)} className="text-red-400 p-2 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-full transition-colors shrink-0">
                        <XIcon />
                      </button>
                    </div>
                  )}

                  <button 
                    type="submit" 
                    disabled={loading}
                    className="group w-full py-4.5 sm:py-5 rounded-2xl sm:rounded-[24px] flex items-center justify-center gap-3 text-white font-black uppercase tracking-[0.15em] transition-all shadow-xl active:scale-[0.98] disabled:bg-gray-300 dark:disabled:bg-gray-700 relative overflow-hidden"
                    style={{ 
                      backgroundColor: loading ? undefined : PRIMARY_COLOR,
                      boxShadow: loading ? undefined : `0 12px 24px -6px ${PRIMARY_COLOR}66`
                    }}
                  >
                    <div className="absolute inset-0 bg-gradient-to-r from-white/0 via-white/20 to-white/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000 ease-in-out" />
                    {loading ? (
                      <div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin" />
                    ) : (
                      <div className="flex items-center gap-2.5">
                        <SendIcon />
                        <span className="text-sm">Enviar Datos</span>
                      </div>
                    )}
                  </button>
                </form>

                {status.message && (
                  <div className={`mt-5 p-4 rounded-2xl flex items-center gap-3 text-xs font-bold border ${
                    status.type === 'success' 
                    ? 'bg-green-50 text-green-700 border-green-200 dark:bg-green-500/10 dark:text-green-400 dark:border-green-500/20' 
                    : 'bg-red-50 text-red-700 border-red-200 dark:bg-red-500/10 dark:text-red-400 dark:border-red-500/20'
                  }`}>
                    <div className="shrink-0">
                      {status.type === 'success' ? <CheckCircleIcon /> : <AlertCircleIcon />}
                    </div>
                    <span className="uppercase tracking-wide">{status.message}</span>
                  </div>
                )}

              </div>
              
              <div className="mt-10 opacity-50 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-[0.4em] text-center">
                Freework Network &bull; v4.1
              </div>
            </div>
          );
        }

        // 5. INICIALIZAR LA APLICACIÓN
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
