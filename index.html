<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FreeWorkWeb</title>
    <link rel="icon" type="image/svg+xml" href="imagenes/logo.svg">

<meta property="og:title" content="Freework - Tu Plataforma de Trabajo">
<meta property="og:description" content="Descripción de tu empresa aquí">
<meta property="og:image" content="https://freeworkweb.cl/imagenes/logo.svg">
<meta property="og:url" content="https://freeworkweb.cl">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Tipografía Corporativa Premium */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        /* ==========================================================
           1. CONFIGURACIÓN BASE Y CONTENEDOR IFRAME
           ========================================================== */
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            width: 100vw;
            height: 100dvh; /* dvh asegura que respete la barra móvil */
            overflow: hidden; 
            background-color: #07090E; /* Fondo base oscuro */
        }

        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .no-tap-highlight { -webkit-tap-highlight-color: transparent; }
        .click-through { pointer-events: none; }
        .click-catch { pointer-events: auto; }

        /* ==========================================================
           2. ESTILOS ESCRITORIO (FLOATING DOCK DINÁMICO)
           ========================================================== */
        .desktop-dock {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 
                0 16px 40px -8px rgba(0, 0, 0, 0.08),
                0 6px 16px -4px rgba(0, 0, 0, 0.04),
                inset 0 1px 1px rgba(255, 255, 255, 1),
                inset 0 -1px 1px rgba(255, 255, 255, 0.3);
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            padding: 6px 6px 6px 20px;
            gap: 16px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .desktop-links-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-link-desktop {
            position: relative;
            color: #475569;
            font-size: 13.5px;
            font-weight: 600;
            letter-spacing: -0.01em;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            cursor: pointer;
        }

        .nav-link-desktop:hover { 
            color: #0f172a; 
            background: rgba(0, 0, 0, 0.03);
        }
        
        .nav-link-desktop.is-active { 
            color: #5B3281; 
            font-weight: 700; 
            background: rgba(91, 50, 129, 0.06);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .btn-action-premium {
            background: linear-gradient(135deg, #5B3281 0%, #3b1654 100%);
            color: white;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 
                0 8px 20px -4px rgba(91, 50, 129, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.2),
                inset 0 -2px 4px rgba(0,0,0,0.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-action-premium:hover {
            transform: scale(1.02);
            box-shadow: 
                0 12px 25px -4px rgba(91, 50, 129, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.3);
        }
        
        .btn-action-premium:active { transform: scale(0.98); }


        /* ==========================================================
           3. ESTILOS MÓVIL (MAGIC TAB BAR - ULTRA PREMIUM)
           ========================================================== */
        
        .mobile-nav-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
        }

        .premium-bottom-bar {
            background: rgba(13, 14, 18, 0.85); /* Negro profundo cristalino */
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border-top: 1px solid rgba(255, 255, 255, 0.08); /* Brillo cortado superior */
            box-shadow: 0 -20px 40px -10px rgba(0, 0, 0, 0.5); /* Sombra difusa hacia arriba */
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: calc(72px + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px); /* Ajuste automático Apple */
            position: relative;
        }

        /* --- GLIDER MÁGICO (Línea de Neón Superior) --- */
        .magic-glider {
            position: absolute;
            top: -1px;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, #c026d3, #7c3aed);
            box-shadow: 
                0 2px 10px 1px rgba(217, 70, 239, 0.7), 
                0 0 25px rgba(124, 58, 237, 0.5);
            border-radius: 0 0 4px 4px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            opacity: 0; /* Oculto hasta que JS inicializa */
        }

        .nav-link-app {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 72px;
            color: #475569; /* Gris pizarra oscuro inactivo */
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            padding-top: 4px;
        }

        .nav-icon-box {
            position: relative;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Aura de luz trasera (oculta por defecto) */
        .nav-icon-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(217, 70, 239, 0.25) 0%, transparent 70%);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .nav-link-app svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.5px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2;
        }

        .nav-link-app span {
            font-size: 10px;
            font-weight: 500;
            margin-top: 2px;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        /* --- ESTADO ACTIVO (BOTÓN SELECCIONADO) --- */
        .nav-link-app.is-active {
            color: #f8fafc; /* Texto blanco vibrante */
        }

        .nav-link-app.is-active .nav-icon-box {
            transform: translateY(-4px); /* El ícono flota hacia arriba */
        }

        .nav-link-app.is-active .nav-icon-box::before {
            opacity: 1;
            transform: scale(1.6); /* El aura de luz crece y se enciende */
        }

        .nav-link-app.is-active svg {
            stroke: #d946ef; /* Fucsia Neón */
            stroke-width: 2.5px;
            filter: drop-shadow(0 2px 6px rgba(217, 70, 239, 0.6)); /* Sombra brillante */
        }

        .nav-link-app.is-active span {
            font-weight: 700;
            color: #f8fafc;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="relative w-full h-full">

    <!-- IFRAME QUE MUESTRA TODAS LAS PÁGINAS -->
    <iframe id="content-frame" src="inicio.html" title="Contenido Principal"></iframe>

    <!-- 
      ========================================================================
      💻 VISTA WEB (ESCRITORIO - AUTO-HUGGING DOCK)
      ========================================================================
    -->
    <header class="hidden md:flex fixed top-6 left-0 w-full justify-center z-[9999] px-6 click-through">
        <nav class="desktop-dock click-catch">
            
            <div id="desktop-links" class="desktop-links-container"></div>

            <div class="w-[1px] h-8 bg-slate-200 mx-2"></div>

            <a onclick="loadInIframe('registro.html')" class="btn-action-premium no-tap-highlight flex items-center text-white rounded-full py-3 px-6 font-bold text-sm tracking-tight border border-white/10 shrink-0">
                <div class="mr-2.5 bg-white/20 p-1.5 rounded-full flex items-center justify-center border border-white/10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/>
                    </svg>
                </div>
                Registro FreeWork
            </a>
            
        </nav>
    </header>

    <!-- 
      ========================================================================
      📱 VISTA MÓVIL (ULTRA PREMIUM BOTTOM NAVIGATION)
      ========================================================================
    -->
    <div class="md:hidden mobile-nav-wrapper click-catch">
        <nav class="premium-bottom-bar" id="mobile-bottom-nav">
            <!-- La línea de Neón Mágica -->
            <div id="magic-glider" class="magic-glider"></div>
            <!-- Los enlaces móviles se inyectan automáticamente aquí -->
        </nav>
    </div>

    <!-- 
      ========================================================================
      ⚙️ LÓGICA DE NAVEGACIÓN Y CONTROL
      ========================================================================
    -->
    <script>
        const BOTONES = [
            { nombre: 'Home', link: 'inicio.html' },
            { nombre: 'Empresa', link: 'empresa.html' }, 
            { nombre: 'Servicios', link: 'servicios.html' },
            { nombre: 'Nosotros', link: 'nosotros.html' }, 
            { nombre: 'Blog', link: 'blog.html' }
        ];

        // Diccionario de Iconos Lucide
        const ICONS = {
            'inicio.html': 'home',
            'empresa.html': 'building-2',
            'servicios.html': 'layers',
            'nosotros.html': 'users',
            'blog.html': 'book-open'
        };

        // Función que mueve el Glider de Neón hacia la pestaña seleccionada
        function updateGlider() {
            const glider = document.getElementById('magic-glider');
            const activeLink = document.querySelector('.nav-link-app.is-active');
            
            if (glider && activeLink) {
                const rect = activeLink.getBoundingClientRect();
                const barRect = document.getElementById('mobile-bottom-nav').getBoundingClientRect();
                
                const width = 40; // Ancho del haz de luz
                // Calcular posición relativa al contenedor
                const left = (rect.left - barRect.left) + (rect.width / 2) - (width / 2);
                
                glider.style.width = `${width}px`;
                glider.style.transform = `translateX(${left}px)`;
                glider.style.opacity = '1';
            }
        }

        // Función global para cargar URLs en el iframe y actualizar estados
        function loadInIframe(urlTarget) {
            const iframe = document.getElementById('content-frame');
            iframe.src = urlTarget;
            
            // Actualizar clases activas
            document.querySelectorAll('.nav-link-desktop, .nav-link-app').forEach(el => {
                if (el.dataset.link === urlTarget) {
                    el.classList.add('is-active');
                } else {
                    el.classList.remove('is-active');
                }
            });

            // Actualizar la posición de la luz de neón
            setTimeout(updateGlider, 50);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dCont = document.getElementById('desktop-links');
            const mNav = document.getElementById('mobile-bottom-nav');

            BOTONES.forEach((item, index) => {
                // Generar enlace para ESCRITORIO
                const dL = document.createElement('a');
                dL.textContent = item.nombre;
                dL.dataset.link = item.link;
                dL.className = `nav-link-desktop ${index === 0 ? 'is-active' : ''}`;
                dL.onclick = () => loadInIframe(item.link);
                dCont.appendChild(dL);

                // Generar enlace para MÓVIL (Magic Tab Bar)
                const mL = document.createElement('a');
                mL.dataset.link = item.link;
                mL.className = `nav-link-app cursor-pointer ${index === 0 ? 'is-active' : ''}`;
                mL.onclick = () => loadInIframe(item.link);

                const iconName = ICONS[item.link] || 'circle';

                mL.innerHTML = `
                    <div class="nav-icon-box">
                        <i data-lucide="${iconName}"></i>
                    </div>
                    <span>${item.nombre}</span>
                `;
                mNav.appendChild(mL);
            });

            lucide.createIcons();
            
            // Inicializar la posición del neón y escuchar cambios de pantalla
            setTimeout(updateGlider, 100);
            window.addEventListener('resize', updateGlider);
        });
    </script>
</body>
</html>
