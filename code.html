<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetManager Premium</title>
    <!-- React, ReactDOM, Babel & Tailwind -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://script.google.com/macros/s/AKfycbzasuDAxMCfFIKNgjnB6gXFxqqa6BVEy7NoI5d63c10IDlzHGfajP4lcLwfltKKwBnM8g/exec');

        :root {
            --bg-app: #FAFAFA;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            -webkit-tap-highlight-color: transparent;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Scrollbar Premium iOS Style */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .loader {
            border: 2px solid rgba(0,0,0,0.05);
            border-top: 2px solid #0f172a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea, select {
            transition: all 0.2s ease;
        }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">

    <!-- =====================================================
         ⚙️  CONFIGURACIÓN DE API EXTERNA (Opcional)
         Pega aquí la URL de tu Web App de Google Apps Script.
         Menú GAS: Desplegar → Administrar implementaciones → URL
         Acceso debe ser: "Cualquiera"
         ===================================================== -->
    <script>
        window.GAS_URL = 'https://script.google.com/macros/s/AKfycbzasuDAxMCfFIKNgjnB6gXFxqqa6BVEy7NoI5d63c10IDlzHGfajP4lcLwfltKKwBnM8g/exec';
    </script>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =============================================================
        //  API HELPERS — fetch para HTML standalone externo
        // =============================================================

        async function apiCargar() {
            const url = window.GAS_URL + '?action=cargar&t=' + Date.now();
            const res  = await fetch(url);
            const json = await res.json();
            return json.data || [];
        }

        async function apiGuardar(proyectos) {
    const res = await fetch(window.GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify({ action: 'guardar', data: proyectos })
    });
    const json = await res.json();
    console.log('[GAS guardar]', json);
    return json;
}

        // Exporta los archivos físicos del proyecto a Google Drive
        async function apiExportar(proyecto) {
            await fetch(window.GAS_URL, {
                method:  'POST',
                mode:    'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ action: 'exportar', proyecto: proyecto })
            });
        }

        // =============================================================
        //  MOCK DATA
        // =============================================================
        const MOCK_DATA = [
            {
                id: 1,
                title: "Configuración Nginx Producción",
                category: "DevOps",
                status: "Activo",
                pinned: true,
                description: "Archivos de configuración del proxy inverso, balanceo de carga y certificados SSL para el entorno de producción principal.",
                icon: "server",
                files: [
                    { name: "nginx.conf", code: "user www-data;\nworker_processes auto;\npid /run/nginx.pid;\ninclude /etc/nginx/modules-enabled/*.conf;\n\nevents {\n\tworker_connections 768;\n}\n\nhttp {\n\tinclude /etc/nginx/mime.types;\n\tdefault_type application/octet-stream;\n\taccess_log /var/log/nginx/access.log;\n}" }
                ],
                steps: [
                    { text: "Verificar sintaxis", sub: "sudo nginx -t" }
                ],
                localPaths: [
                    { label: "Directorio Nginx", path: "/etc/nginx/" }
                ],
                images: ["https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=500&auto=format&fit=crop"],
                attachments: []
            }
        ];

        // =============================================================
        //  COMPONENTES
        // =============================================================

        const Icon = ({ name, className = "" }) => {
            const map = {
                'plus': 'fa-plus', 'trash': 'fa-trash', 'copy': 'fa-copy', 'check': 'fa-check',
                'times': 'fa-xmark', 'file-code': 'fa-file-code', 'folder-open': 'fa-folder-open', 
                'arrow-left': 'fa-arrow-left', 'pencil': 'fa-pen', 'search': 'fa-magnifying-glass', 
                'cloud': 'fa-cloud', 'rocket': 'fa-rocket', 'image': 'fa-image', 'zap': 'fa-bolt', 
                'activity': 'fa-chart-line', 'filter': 'fa-filter', 'chevron-down': 'fa-chevron-down', 
                'chevron-right': 'fa-chevron-right', 'upload': 'fa-cloud-arrow-up', 'server': 'fa-server',
                'code': 'fa-code', 'database': 'fa-database', 'link': 'fa-link', 'terminal': 'fa-terminal',
                'paperclip': 'fa-paperclip', 'download': 'fa-download', 'file-pdf': 'fa-file-pdf',
                'file-zip': 'fa-file-zipper', 'file-alt': 'fa-file-lines', 'star': 'fa-star'
            };
            return <i className={`fa-solid ${map[name] || 'fa-folder'} ${className}`}></i>;
        };

        const StatusBadge = ({ status, dot = true }) => {
            const configs = {
                'Activo':        { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200/50', dot: 'bg-emerald-500' },
                'En Desarrollo': { bg: 'bg-blue-50',    text: 'text-blue-700',    border: 'border-blue-200/50',    dot: 'bg-blue-500'    },
                'En Pausa':      { bg: 'bg-amber-50',   text: 'text-amber-700',   border: 'border-amber-200/50',   dot: 'bg-amber-500'   },
                'Archivado':     { bg: 'bg-slate-100',  text: 'text-slate-600',   border: 'border-slate-200',      dot: 'bg-slate-400'   }
            };
            const c = configs[status] || configs['Archivado'];
            return (
                <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold tracking-wide border ${c.bg} ${c.text} ${c.border}`}>
                    {dot && <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>}
                    {status}
                </span>
            );
        };

        // FIX #1: Eliminado document.execCommand('copy') deprecado.
        // Solo se usa navigator.clipboard.writeText que es el estándar moderno.
        const PremiumCopyButton = ({ text, label, isMini = false }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = (e) => {
                e.stopPropagation();
                e.preventDefault();
                navigator.clipboard.writeText(text || '').then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }).catch(() => {
                    // Fallback para contextos sin permisos de clipboard (ej. HTTP sin HTTPS)
                    const ta = document.createElement('textarea');
                    ta.value = text || '';
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    try { document.execCommand('copy'); } catch(_) {}
                    document.body.removeChild(ta);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };
            
            if (isMini) {
                return (
                    <button onClick={handleCopy} className={`flex-shrink-0 flex items-center justify-center w-7 h-7 rounded-lg transition-all ${copied ? 'bg-emerald-100 text-emerald-600 scale-110' : 'bg-slate-100 text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 active:scale-95'}`} title="Copiar">
                        <Icon name={copied ? "check" : "copy"} className="text-[11px]"/>
                    </button>
                );
            }

            return (
                <button onClick={handleCopy} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${copied ? 'bg-emerald-50 text-emerald-600 border border-emerald-200' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 active:scale-95 shadow-sm'}`}>
                    <Icon name={copied ? "check" : "copy"} className={copied ? "text-emerald-500" : "text-slate-400"}/>
                    {copied ? 'Copiado!' : label || 'Copiar'}
                </button>
            );
        };

        const ToolGridCard = ({ tool, onClick, onDelete, onEdit, onTogglePin }) => {
            const safeImages = tool.images || [];
            const mainImage = safeImages.find(img => img && img.trim() !== "") || null;
            const filesCount = (tool.files || []).length;
            const pathsCount = (tool.localPaths || []).length;
            const attachmentsCount = (tool.attachments || []).length;

            return (
                <div onClick={onClick} className="bg-white rounded-[24px] shadow-[0_2px_10px_rgb(0,0,0,0.02)] border border-slate-200/60 overflow-hidden cursor-pointer hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 flex flex-col h-full group relative">
                    {/* Carátula */}
                    <div className="h-40 bg-slate-50 relative overflow-hidden flex items-center justify-center p-2">
                        {mainImage ? (
                            <div className="w-full h-full rounded-[16px] overflow-hidden relative">
                                <img src={mainImage} alt={tool.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"/>
                                <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            </div>
                        ) : (
                            <div className="w-full h-full rounded-[16px] border border-dashed border-slate-200 bg-slate-50 flex flex-col items-center justify-center text-slate-400 transition-colors group-hover:bg-slate-100">
                                <Icon name="image" className="text-3xl mb-2 opacity-30" />
                                <span className="text-[10px] uppercase font-bold tracking-widest opacity-40">No Cover</span>
                            </div>
                        )}
                        
                        {/* Botones de acción flotantes */}
                        <div className="absolute top-4 right-4 flex gap-1 z-10">
                            <button onClick={(e) => { e.stopPropagation(); onTogglePin(tool.id); }} className={`w-9 h-9 rounded-full flex items-center justify-center shadow-md backdrop-blur-md transition-all ${tool.pinned ? 'bg-amber-400 text-white shadow-amber-400/30 scale-100' : 'bg-white/70 text-slate-500 hover:bg-white hover:text-amber-500 opacity-0 group-hover:opacity-100 scale-90 group-hover:scale-100'}`} title={tool.pinned ? "Desfijar" : "Fijar proyecto"}>
                                <Icon name="star" className="text-sm"/>
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); onEdit(tool); }} className="hidden md:flex w-9 h-9 bg-white/80 backdrop-blur-md rounded-full items-center justify-center text-slate-600 hover:text-indigo-600 shadow-sm transition-all opacity-0 group-hover:opacity-100 hover:scale-105">
                                <Icon name="pencil" className="text-sm"/>
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); onDelete(tool.id); }} className="hidden md:flex w-9 h-9 bg-white/80 backdrop-blur-md rounded-full items-center justify-center text-slate-600 hover:text-red-600 shadow-sm transition-all opacity-0 group-hover:opacity-100 hover:scale-105">
                                <Icon name="trash" className="text-sm"/>
                            </button>
                        </div>

                        {/* Icono Principal */}
                        <div className="absolute bottom-4 left-4 w-10 h-10 bg-white/90 backdrop-blur-md rounded-xl shadow-sm border border-white flex items-center justify-center text-slate-700 z-10">
                            <Icon name={tool.icon || 'folder-open'} className="text-lg" />
                        </div>
                    </div>

                    <div className="p-5 flex-1 flex flex-col">
                        <div className="mb-3 flex items-center gap-2">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{tool.category || 'General'}</span>
                            <div className="flex-1"></div>
                            <StatusBadge status={tool.status} />
                        </div>
                        
                        <h3 className="font-bold text-[17px] text-slate-900 mb-2 leading-tight tracking-tight group-hover:text-indigo-600 transition-colors">{tool.title}</h3>
                        <p className="text-slate-500 text-[13px] line-clamp-2 mb-5 flex-1 leading-relaxed">{tool.description}</p>
                        
                        <div className="pt-4 border-t border-slate-100 flex items-center justify-between text-[11px] text-slate-400 font-semibold">
                            <div className="flex gap-3.5">
                                <span className="flex items-center gap-1.5"><Icon name="file-code" className="text-slate-300"/> {filesCount}</span>
                                <span className="flex items-center gap-1.5"><Icon name="link" className="text-slate-300"/> {pathsCount}</span>
                                {(attachmentsCount > 0 || safeImages.length > 0) && (
                                    <span className="flex items-center gap-1.5"><Icon name="paperclip" className="text-slate-300"/> {attachmentsCount + safeImages.length}</span>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const FileViewer = ({ file, defaultOpen = true }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="border border-slate-200 rounded-2xl overflow-hidden bg-white mb-4 shadow-sm transition-all duration-300">
                    <div className="p-3 md:p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors" onClick={() => setIsOpen(!isOpen)}>
                        <div className="flex items-center gap-3 overflow-hidden">
                            <div className={`w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0 transition-transform duration-300 ${isOpen ? 'rotate-90' : ''}`}>
                                <Icon name="chevron-right" className="text-[10px] text-slate-500"/>
                            </div>
                            <Icon name="file-code" className="text-indigo-500 text-sm flex-shrink-0"/>
                            <span className="font-mono text-sm font-semibold text-slate-700 truncate">{file.name}</span>
                        </div>
                        <div className="flex-shrink-0 ml-2">
                            <PremiumCopyButton text={file.code} isMini={true} />
                        </div>
                    </div>
                    {isOpen && (
                        <div className="p-4 md:p-5 bg-slate-900 border-t border-slate-100">
                            <pre className="font-mono text-[13px] text-slate-300 leading-relaxed whitespace-pre-wrap overflow-x-auto hide-scroll">{file.code}</pre>
                        </div>
                    )}
                </div>
            );
        };

        const ProjectDetailView = ({ tool, onDelete, onEdit, onBack, onTogglePin }) => {
            const safeSteps       = tool.steps       || [];
            const safeFiles       = tool.files       || [];
            const safeImages      = tool.images      || [];
            const safePaths       = tool.localPaths  || [];
            const safeAttachments = tool.attachments || [];

            return (
                <div className="slide-up max-w-5xl mx-auto pb-24 md:pb-12">
                    {/* Header sticky móvil */}
                    <div className="sticky top-0 md:relative z-40 bg-white/80 md:bg-transparent backdrop-blur-xl md:backdrop-blur-none border-b md:border-none border-slate-200 px-4 py-3 md:px-0 md:py-0 flex items-center justify-between mb-0 md:mb-6 -mx-4 md:mx-0">
                        <button onClick={onBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-900 font-semibold transition-colors text-sm py-2">
                            <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center"><Icon name="arrow-left" className="text-xs"/></div> 
                            <span className="hidden sm:inline">Volver</span>
                        </button>
                        <div className="flex gap-2">
                            <button onClick={() => onTogglePin(tool.id)} className={`w-10 h-10 md:w-auto md:px-4 md:py-2 rounded-full md:rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all ${tool.pinned ? 'bg-amber-100 text-amber-600' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 shadow-sm'}`}>
                                <Icon name="star"/> <span className="hidden md:inline">{tool.pinned ? 'Desfijar' : 'Fijar'}</span>
                            </button>
                            <div className="hidden md:flex gap-2">
                                <button onClick={() => onEdit(tool)} className="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-xl text-sm font-semibold hover:bg-slate-50 flex items-center gap-2 shadow-sm active:scale-95 transition-all"><Icon name="pencil"/> Editar</button>
                                <button onClick={() => onDelete(tool.id)} className="px-4 py-2 bg-white border border-red-200 text-red-600 rounded-xl text-sm font-semibold hover:bg-red-50 flex items-center gap-2 shadow-sm active:scale-95 transition-all"><Icon name="trash"/> Eliminar</button>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white md:rounded-[32px] md:shadow-[0_8px_30px_rgb(0,0,0,0.04)] md:border border-slate-200/60 overflow-hidden mt-4 md:mt-0">
                        {/* Cabecera del Documento */}
                        <div className="p-6 md:p-10 bg-gradient-to-b from-slate-50 to-white flex flex-col md:flex-row gap-6 md:items-start border-b border-slate-100">
                            <div className="w-16 h-16 md:w-20 md:h-20 rounded-2xl bg-white border border-slate-200 flex items-center justify-center text-3xl text-slate-400 shadow-sm flex-shrink-0">
                                <Icon name={tool.icon || 'folder'} />
                            </div>
                            <div className="flex-1">
                                <div className="flex items-center gap-3 mb-3">
                                    <span className="text-[11px] font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md uppercase tracking-widest">{tool.category}</span>
                                    <StatusBadge status={tool.status} />
                                </div>
                                <h1 className="text-2xl md:text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">{tool.title}</h1>
                                <p className="text-slate-500 text-sm md:text-base leading-relaxed max-w-3xl">{tool.description}</p>
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row">
                            {/* Columna Izquierda */}
                            <div className="w-full lg:w-1/3 p-6 md:p-8 bg-slate-50/50 border-r border-slate-100 space-y-8">
                                {safePaths.length > 0 && (
                                    <section>
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="link"/> Accesos Locales</h3>
                                        <div className="space-y-3">
                                            {safePaths.map((p, idx) => (
                                                <div key={idx} className="bg-white p-3 md:p-4 rounded-2xl border border-slate-200/60 shadow-sm flex flex-col gap-2 group">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm font-semibold text-slate-800">{p.label}</span>
                                                        <div className="md:opacity-0 group-hover:opacity-100 transition-opacity"><PremiumCopyButton text={p.path} isMini={true} /></div>
                                                    </div>
                                                    <div className="bg-slate-50 px-3 py-2 rounded-xl border border-slate-100 overflow-hidden">
                                                        <code className="text-xs font-mono text-slate-500 whitespace-nowrap overflow-hidden text-ellipsis block" title={p.path}>{p.path}</code>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}

                                {safeSteps.length > 0 && (
                                    <section>
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-5 flex items-center gap-2"><Icon name="terminal"/> Flujo de Trabajo</h3>
                                        <div className="relative border-l-2 border-slate-200 pl-5 space-y-6 ml-2">
                                            {safeSteps.map((step, idx) => (
                                                <div key={idx} className="relative">
                                                    <div className="absolute -left-[27px] top-1 w-3 h-3 rounded-full bg-white border-2 border-slate-300"></div>
                                                    <h4 className="font-semibold text-slate-800 text-sm mb-2">{step.text}</h4>
                                                    {step.sub && (
                                                        <div className="flex items-center justify-between bg-slate-800 rounded-xl px-3 py-2.5 group">
                                                            <code className="text-[11px] font-mono text-emerald-400 overflow-hidden text-ellipsis whitespace-nowrap mr-2">{step.sub}</code>
                                                            <PremiumCopyButton text={step.sub} isMini={true} />
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}
                            </div>

                            {/* Columna Derecha */}
                            <div className="w-full lg:w-2/3 p-6 md:p-10">
                                <section className="mb-10">
                                    <div className="flex items-center justify-between mb-5">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="file-code"/> Código Fuente</h3>
                                        <span className="text-[11px] font-semibold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">{safeFiles.length} fragmentos</span>
                                    </div>
                                    <div className="space-y-4">
                                        {safeFiles.map((file, idx) => <FileViewer key={idx} file={file} defaultOpen={idx === 0} />)}
                                    </div>
                                </section>

                                {safeAttachments.length > 0 && (
                                    <section className="mb-10 border-t border-slate-200 pt-8">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-5 flex items-center gap-2"><Icon name="paperclip"/> Archivos y Carpetas Adjuntas</h3>
                                        <div className="grid sm:grid-cols-2 gap-3 max-h-80 overflow-y-auto custom-scrollbar pr-2">
                                            {safeAttachments.map((att, idx) => (
                                                <div key={idx} className="bg-white border border-slate-200/60 rounded-2xl p-3 flex items-center justify-between shadow-[0_2px_8px_rgb(0,0,0,0.02)] hover:border-indigo-200 hover:shadow-md transition-all group">
                                                    <div className="flex items-center gap-3 overflow-hidden">
                                                        <div className="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center flex-shrink-0">
                                                            <Icon name={att.type.includes('pdf') ? 'file-pdf' : att.type.includes('zip') ? 'file-zip' : 'file-alt'} className="text-lg"/>
                                                        </div>
                                                        <div className="overflow-hidden">
                                                            <div className="flex items-center gap-2 mb-0.5">
                                                                <p className="text-sm font-bold text-slate-800 truncate" title={att.path || att.name}>{att.path || att.name}</p>
                                                                <PremiumCopyButton text={att.path || att.name} isMini={true} />
                                                            </div>
                                                            <p className="text-[11px] text-slate-500 font-medium">{(att.size / 1024 / 1024).toFixed(2)} MB</p>
                                                        </div>
                                                    </div>

// ── CORRECCIÓN: persistir es ahora async y sin mode:'no-cors'
const persistir = async (newProjects, currentProject = null) => {
    if (!GAS_CONFIGURED) return;
    try {
        let projectsToSave = newProjects;

        // 1. Si hay proyecto nuevo/editado con base64, exportar a Drive PRIMERO
        if (currentProject) {
            const tieneBase64 = (currentProject.images || []).some(img => img && img.startsWith('data:'))
                || (currentProject.attachments || []).some(att => att.data);

            if (tieneBase64) {
                // BUG1 FIX: sin mode:'no-cors' → podemos leer la respuesta
                const res = await fetch(window.GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // GAS acepta text/plain sin preflight
                    body: JSON.stringify({ action: 'exportar', proyecto: currentProject })
                });

                if (res.ok) {
                    const json = await res.json();
                    if (json.ok) {
                        const updated = { ...currentProject };

                        if (json.urls?.images?.length) {
                            const urlsExistentes = (currentProject.images || [])
                                .filter(img => img && !img.startsWith('data:'));
                            updated.images = [...urlsExistentes, ...json.urls.images];
                        }

                        if (json.urls?.attachments) {
                            updated.attachments = (currentProject.attachments || []).map(att => ({
                                name: att.name,
                                path: att.path,
                                type: att.type,
                                size: att.size,
                                driveUrl: json.urls.attachments[att.path || att.name] || att.driveUrl || null
                                // BUG5 FIX: sin att.data → no satura UserProperties con base64
                            }));
                        }

                        projectsToSave = newProjects.map(p =>
                            p.id === updated.id ? updated : p
                        );
                        setProjects(projectsToSave);
                    }
                }
            }
        }

        // 2. Guardar metadata limpia (sin base64) en UserProperties
        // BUG1 FIX: sin mode:'no-cors'
        await fetch(window.GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'guardar', data: projectsToSave })
        });

    } catch (e) {
        console.warn('Error persistiendo:', e);
    }
};

                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setView('grid'); setEditingProject(null); }}>
                            <div className="w-9 h-9 bg-slate-900 rounded-[10px] flex items-center justify-center shadow-md"><Icon name="server" className="text-white text-sm" /></div>
                            <span className="font-extrabold text-lg tracking-tight text-slate-900">AssetManager</span>
                        </div>
                        <div className="flex items-center gap-3">
                            {IS_NATIVE ? (
                                <div className="hidden sm:flex items-center gap-2 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-[11px] font-bold text-emerald-700 tracking-wide uppercase">Nativo GAS</span>
                                </div>
                            ) : gasError ? (
                                <div className="hidden sm:flex items-center gap-2 bg-red-50 px-3 py-1.5 rounded-full border border-red-100">
                                    <div className="w-1.5 h-1.5 rounded-full bg-red-500"></div>
                                    <span className="text-[11px] font-bold text-red-600 tracking-wide uppercase">Error API</span>
                                </div>
                            ) : GAS_CONFIGURED ? (
                                <div className="hidden sm:flex items-center gap-2 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-[11px] font-bold text-emerald-700 tracking-wide uppercase">API Externa</span>
                                </div>
                            ) : (
                                <div className="hidden sm:flex items-center gap-2 bg-amber-50 px-3 py-1.5 rounded-full border border-amber-100">
                                    <div className="w-1.5 h-1.5 rounded-full bg-amber-500"></div>
                                    <span className="text-[11px] font-bold text-amber-600 tracking-wide uppercase">Demo Local</span>
                                </div>
                            )}
                            <div className="w-9 h-9 rounded-full bg-indigo-50 border border-indigo-100 flex items-center justify-center text-xs font-bold text-indigo-600">AD</div>
                        </div>
                    </nav>

                    <main className="flex-1 p-4 md:p-8 relative">
                        {loading && (
                            <div className="absolute inset-0 bg-[var(--bg-app)]/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                                <div className="loader mb-4"></div>
                                <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Sincronizando...</span>
                            </div>
                        )}

                        {view === 'grid' && (
                            <div className="fade-in max-w-7xl mx-auto">
                                <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Directorio</h1>
                                        <p className="text-sm text-slate-500 mt-1">Gestión centralizada de conocimiento y activos.</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="relative flex-1 md:w-80">
                                            <Icon name="search" className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input type="text" placeholder="Buscar..." className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200/60 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm shadow-sm transition-all" value={search} onChange={(e) => setSearch(e.target.value)} />
                                        </div>
                                        <button onClick={() => { setEditingProject(null); setView('form'); }} className="hidden md:flex bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold shadow-md hover:bg-slate-800 hover:shadow-lg active:scale-95 transition-all items-center gap-2">
                                            <Icon name="plus" /> Nuevo
                                        </button>
                                    </div>
                                </div>

                                {!IS_NATIVE && !GAS_CONFIGURED && (
                                    <div className="mb-6 bg-amber-50 border border-amber-200 rounded-2xl p-4 flex items-start gap-3">
                                        <div className="w-8 h-8 bg-amber-100 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5"><Icon name="zap" className="text-amber-600 text-sm"/></div>
                                        <div>
                                            <p className="text-sm font-bold text-amber-800">Modo demo — sin persistencia</p>
                                            <p className="text-xs text-amber-700 mt-0.5">Edita <code className="bg-amber-100 px-1 rounded font-mono">window.GAS_URL</code> en el código o despliega este archivo en Google Apps Script para guardar tus cambios.</p>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                                    {filtered.map(p => (
                                        <ToolGridCard
                                            key={p.id}
                                            tool={p}
                                            onClick={() => { setSelectedId(p.id); setView('detail'); }}
                                            onDelete={handleDelete}
                                            onEdit={(t) => { setEditingProject(t); setView('form'); }}
                                            onTogglePin={handleTogglePin}
                                        />
                                    ))}
                                </div>
                                
                                {filtered.length === 0 && !loading && (
                                    <div className="text-center py-20 bg-transparent border-2 border-dashed border-slate-200 rounded-3xl mt-4">
                                        <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto shadow-sm mb-4"><Icon name="folder-open" className="text-2xl text-slate-300" /></div>
                                        <h3 className="text-lg font-bold text-slate-800">Directorio vacío</h3>
                                        <p className="text-slate-500 text-sm mt-1">No hay activos que coincidan con tu búsqueda.</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'form' && <ProjectForm onSave={handleSave} onCancel={() => setView('grid')} initialData={editingProject} />}
                        {view === 'detail' && projects.find(p => p.id === selectedId) && (
                            <ProjectDetailView
                                tool={projects.find(p => p.id === selectedId)}
                                onBack={() => setView('grid')}
                                onDelete={handleDelete}
                                onEdit={(t) => { setEditingProject(t); setView('form'); }}
                                onTogglePin={handleTogglePin}
                            />
                        )}
                    </main>

                    {/* FAB Móvil */}
                    {view === 'grid' && (
                        <button onClick={() => { setEditingProject(null); setView('form'); }} className="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-slate-900 text-white rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.2)] flex items-center justify-center z-40 active:scale-90 transition-transform">
                            <Icon name="plus" className="text-xl" />
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
